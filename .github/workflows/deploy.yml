name: Deploy MERN Ecommerce to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Navigate to project directory
            cd ~/aws-mern-ecommerce
            
            # Fetch latest changes
            git pull origin main
            
            # Stop existing containers to release image locks
            docker compose down
            
            # Remove old images and caches to maximize disk space
            docker system prune -a -f
            
            # Build Express server
            docker compose build server
            
            # Clean builder cache before heavy Next.js build
            docker builder prune -f
            
            # Build Next.js client
            docker compose build client
            
            # Start containers
            docker compose up -d
